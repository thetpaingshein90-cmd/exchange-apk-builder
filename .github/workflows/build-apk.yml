name: Build Exchange APK

on:
  workflow_dispatch:
    inputs:
      pin:
        description: 'Tenant PIN'
        required: true
      shop_name:
        description: 'Shop Name'
        required: true
      base_url:
        description: 'Base URL'
        required: true
        default: 'https://exchange.89-167-6-122.nip.io'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Build TWA APK
        run: |
          mkdir -p apk_build && cd apk_build
          
          # Init bubblewrap project
          bubblewrap init \
            --manifest "${{ github.event.inputs.base_url }}/manifest/${{ github.event.inputs.pin }}.json" \
            --directory . \
            --skipPwaValidation \
            --noInput 2>&1 || true

          # Show what was generated
          ls -la
          cat twa-manifest.json 2>/dev/null || true

          # Build
          bubblewrap build --skipPwaValidation 2>&1 || true
          
          # Find any APK
          echo "=== Looking for APKs ==="
          find . -name "*.apk" -o -name "*.aab" 2>/dev/null | head -20
          find /root -name "*.apk" 2>/dev/null | head -5 || true

      - name: Find and copy APK
        id: apk
        run: |
          APK=$(find . -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            APK=$(find ~ -name "*.apk" 2>/dev/null | head -1)
          fi
          echo "Found: $APK"
          if [ -n "$APK" ]; then
            cp "$APK" ./exchange-app.apk
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: exchange-app-${{ github.event.inputs.pin }}
          path: ./exchange-app.apk
          if-no-files-found: warn
          retention-days: 30
