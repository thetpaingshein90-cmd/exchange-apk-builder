name: Build Exchange APK

on:
  workflow_dispatch:
    inputs:
      pin:
        description: 'Tenant PIN'
        required: true
      shop_name:
        description: 'Shop Name'
        required: true
      base_url:
        description: 'Base URL'
        required: true
        default: 'https://exchange.89-167-6-122.nip.io'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap & answer JDK prompt
        run: |
          npm install -g @bubblewrap/cli
          # Pre-configure bubblewrap to use system JDK (avoids interactive prompt)
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_HOME"
          }
          EOF
          cat ~/.bubblewrap/config.json

      - name: Create TWA manifest
        run: |
          HOST=$(echo '${{ github.event.inputs.base_url }}' | sed 's|https://||')
          cat > twa-manifest.json << EOF
          {
            "packageId": "com.exchange.shop${{ github.event.inputs.pin }}",
            "host": "${HOST}",
            "startUrl": "/pin/${{ github.event.inputs.pin }}",
            "name": "${{ github.event.inputs.shop_name }}",
            "launcherName": "${{ github.event.inputs.shop_name }}",
            "display": "standalone",
            "themeColor": "#4CAF50",
            "backgroundColor": "#f4f7f6",
            "enableNotifications": false,
            "shortcuts": [],
            "iconUrl": "${{ github.event.inputs.base_url }}/static/icon-192.png",
            "maskableIconUrl": "${{ github.event.inputs.base_url }}/static/icon-192.png",
            "monochromeIconUrl": "${{ github.event.inputs.base_url }}/static/icon-192.png",
            "appVersion": "1.0.0",
            "appVersionCode": 1,
            "signingMode": "none",
            "generatorApp": "bubblewrap",
            "webManifestUrl": "${{ github.event.inputs.base_url }}/manifest/${{ github.event.inputs.pin }}.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": {"enabled": false},
            "enableSiteSettingsShortcut": true,
            "minSdkVersion": 21,
            "orientation": "default"
          }
          EOF

      - name: Build APK
        run: |
          bubblewrap build --manifest ./twa-manifest.json --skipPwaValidation
          find . -name "*.apk" -o -name "*.aab" | head -10

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: exchange-app-${{ github.event.inputs.pin }}
          path: |
            **/*.apk
            **/*.aab
          if-no-files-found: warn
          retention-days: 30
